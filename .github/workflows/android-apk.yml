name: Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-android-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Generate Android project
        run: npx expo prebuild --platform android --non-interactive

      - name: Pin AndroidX Core for Expo SDK compatibility
        run: |
          if ! grep -q "androidx.core:core:1.13.1" android/build.gradle; then
            cat >> android/build.gradle <<'EOF'

          subprojects {
              configurations.configureEach {
                  resolutionStrategy.force 'androidx.core:core:1.13.1'
                  resolutionStrategy.force 'androidx.core:core-ktx:1.13.1'
              }
          }
          EOF
          fi

      - name: Ensure splash screen background color exists
        run: |
          COLORS_FILE="android/app/src/main/res/values/colors.xml"
          mkdir -p "$(dirname "$COLORS_FILE")"

          if [ ! -f "$COLORS_FILE" ]; then
            cat > "$COLORS_FILE" <<'EOF'
          <resources>
              <color name="splashscreen_background">#FFFFFF</color>
          </resources>
          EOF
          elif ! grep -q 'name="splashscreen_background"' "$COLORS_FILE"; then
            sed -i '/<\/resources>/i\    <color name="splashscreen_background">#FFFFFF</color>' "$COLORS_FILE"
          fi

      - name: Build release APK
        run: cd android && chmod +x ./gradlew && ./gradlew assembleRelease

      - name: Copy APK to build directory
        run: |
          mkdir -p build
          cp android/app/build/outputs/apk/release/app-release.apk build/room-layout-studio.apk

      - name: Upload Android APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: room-layout-studio.apk
          path: build/room-layout-studio.apk
          if-no-files-found: error
